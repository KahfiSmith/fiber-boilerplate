services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiber-boilerplate-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: fiber-boilerplate
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      APP_READ_TIMEOUT: 10s
      APP_WRITE_TIMEOUT: 10s
      APP_SHUTDOWN_TIMEOUT: 10s
      APP_BODY_LIMIT_MB: 4
      APP_PREFORK: "false"
      LOG_LEVEL: info
      LOG_ENCODING: console
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fiber_boilerplate?sslmode=disable&TimeZone=UTC
      REDIS_ADDR: redis:6379
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_KEY_PREFIX: fiber-boilerplate
      GENERATE_SWAGGER_ON_MIGRATE: "false"
      JWT_SECRET: replace-with-strong-random-secret
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 168h
      BCRYPT_COST: "12"
      AUTH_RATE_LIMIT_PER_MINUTE: "5"
      AUTH_OTP_TTL: 5m
      AUTH_OTP_MAX_ATTEMPTS: "5"
      AUTH_DEBUG_EXPOSE_OTP: "false"
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: fiber-boilerplate-postgres
    environment:
      POSTGRES_DB: fiber_boilerplate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fiber_boilerplate"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fiber-boilerplate-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
